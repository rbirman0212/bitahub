<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitaHub — Painel Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh}

  nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:#111118;border-bottom:0.5px solid rgba(255,255,255,0.07)}
  .nav-logo{font-family:'Sora',sans-serif;font-size:18px;font-weight:800}
  .nav-logo span{color:#378ADD}
  .nav-badge{font-size:11px;background:rgba(127,119,221,0.15);color:#7F77DD;padding:4px 10px;border-radius:20px;font-weight:500;margin-left:10px}
  .nav-right{display:flex;align-items:center;gap:1rem}
  .nav-data{font-size:13px;color:rgba(255,255,255,0.35)}
  .btn-sair{font-size:12px;padding:6px 14px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
  .btn-sair:hover{border-color:rgba(220,38,38,0.4);color:#FCA5A5}

  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .login-card{background:#111118;border:0.5px solid rgba(255,255,255,0.08);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
  .login-logo{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
  .login-logo span{color:#378ADD}
  .login-sub{font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:2rem;letter-spacing:1px;text-transform:uppercase}
  .login-label{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:6px;text-align:left;display:block}
  input[type=password],input[type=email]{width:100%;background:#0d0d15;border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;margin-bottom:1rem}
  input:focus{border-color:rgba(55,138,221,0.5)}
  input::placeholder{color:rgba(255,255,255,0.2)}
  .login-error{font-size:13px;color:#FCA5A5;margin-bottom:1rem;display:none;padding:10px;background:rgba(220,38,38,0.1);border-radius:8px;border:0.5px solid rgba(220,38,38,0.2)}

  .main{display:none;padding:2rem}
  .main-inner{max-width:1000px;margin:0 auto}

  /* SEÇÃO SWITCH */
  .secao-switch{display:flex;gap:8px;margin-bottom:2rem;background:#111118;border:0.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:6px;width:fit-content}
  .secao-btn{padding:8px 20px;border-radius:10px;border:none;font-size:13px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.4);transition:all 0.2s;font-family:'Inter',sans-serif;font-weight:500}
  .secao-btn.active{background:#185FA5;color:#fff}
  .secao-btn .s-badge{display:inline-block;background:#EF9F27;color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px}

  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
  .metric{background:#111118;border:0.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:1.25rem}
  .metric-label{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:6px}
  .metric-value{font-family:'Sora',sans-serif;font-size:28px;font-weight:800}
  .metric-value.blue{color:#378ADD}
  .metric-value.amber{color:#EF9F27}
  .metric-value.green{color:#1D9E75}
  .metric-value.purple{color:#7F77DD}

  .tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
  .tab{padding:8px 20px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.1);font-size:13px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.4);transition:all 0.2s;font-family:'Inter',sans-serif}
  .tab.active{background:rgba(55,138,221,0.1);border-color:rgba(55,138,221,0.3);color:#378ADD}
  .tab-badge{display:inline-block;background:#EF9F27;color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px}

  .cards{display:flex;flex-direction:column;gap:12px}
  .colab-card{background:#111118;border:0.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:1.25rem;display:grid;grid-template-columns:56px 1fr auto;gap:1rem;align-items:start}
  .colab-card.aprovado{border-left:3px solid #1D9E75}
  .colab-card.pendente{border-left:3px solid #EF9F27}
  .colab-card.reprovado{border-left:3px solid #DC2626;opacity:0.6}
  .avatar{width:56px;height:56px;border-radius:50%;background:rgba(55,138,221,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#378ADD;flex-shrink:0;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .colab-name{font-size:15px;font-weight:600;margin-bottom:3px}
  .colab-meta{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap}
  .colab-bio{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.55;margin-bottom:8px}
  .colab-tags{display:flex;gap:6px;flex-wrap:wrap}
  .ctag{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}
  .colab-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0}
  .status-badge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;text-align:center}
  .badge-pendente{background:rgba(239,159,39,0.15);color:#EF9F27}
  .badge-aprovado{background:rgba(29,158,117,0.15);color:#1D9E75}
  .badge-reprovado{background:rgba(220,38,38,0.15);color:#FCA5A5}
  .btn-aprovar{padding:8px 16px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap}
  .btn-aprovar:hover{background:#0F6E56}
  .btn-reprovar{padding:8px 16px;background:transparent;color:#FCA5A5;border:0.5px solid rgba(220,38,38,0.3);border-radius:8px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap}
  .btn-reprovar:hover{background:rgba(220,38,38,0.1)}
  .btn-wpp{padding:8px 16px;background:rgba(37,211,102,0.1);color:#25D366;border:0.5px solid rgba(37,211,102,0.25);border-radius:8px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;text-decoration:none;display:block;text-align:center}
  .btn-wpp:hover{background:rgba(37,211,102,0.2)}

  /* CLIENTE CARD */
  .cliente-card{background:#111118;border:0.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:1.25rem;display:grid;grid-template-columns:44px 1fr auto;gap:1rem;align-items:start}
  .cliente-card.aprovado{border-left:3px solid #1D9E75}
  .cliente-card.pendente{border-left:3px solid #EF9F27}
  .cliente-card.reprovado{border-left:3px solid #DC2626;opacity:0.6}
  .cliente-avatar{width:44px;height:44px;border-radius:50%;background:rgba(127,119,221,0.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#7F77DD;flex-shrink:0}
  .vinculo-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(55,138,221,0.1);border:0.5px solid rgba(55,138,221,0.2);color:#378ADD;display:inline-block;margin-top:4px}
  .contato-pref{font-size:11px;color:rgba(255,255,255,0.35);margin-top:4px}

  .empty{text-align:center;padding:3rem;color:rgba(255,255,255,0.25);font-size:14px}
  .empty-icon{font-size:40px;margin-bottom:1rem}
  .loading{text-align:center;padding:3rem;color:rgba(255,255,255,0.3);font-size:14px}
  .spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  .btn-primary{width:100%;padding:13px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s}
  .btn-primary:hover{background:#378ADD}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed}

  .toast{position:fixed;bottom:2rem;right:2rem;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;display:none;animation:slideIn 0.3s ease}
  .toast.success{background:#1D9E75;color:#fff}
  .toast.error{background:#DC2626;color:#fff}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  @media(max-width:600px){
    .metrics{grid-template-columns:1fr 1fr}
    .colab-card,.cliente-card{grid-template-columns:44px 1fr;grid-template-rows:auto auto}
    .colab-actions{flex-direction:row;grid-column:1/-1}
    .main{padding:1rem}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Bita<span>Hub</span></div>
    <div class="login-sub">Painel Administrativo</div>
    <div class="login-error" id="loginError"></div>
    <label class="login-label">Email</label>
    <input type="email" id="emailInput" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')entrar()" />
    <label class="login-label">Senha</label>
    <input type="password" id="senhaInput" placeholder="Sua senha" onkeydown="if(event.key==='Enter')entrar()" />
    <button class="btn-primary" id="btnEntrar" onclick="entrar()">Entrar no painel</button>
  </div>
</div>

<!-- NAV -->
<nav style="display:none" id="navBar">
  <div style="display:flex;align-items:center">
    <div class="nav-logo">Bita<span>Hub</span></div>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-right">
    <div class="nav-data" id="navData"></div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</nav>

<!-- PAINEL -->
<div class="main" id="mainPanel">
  <div class="main-inner">

    <!-- MÉTRICAS -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label" id="met-label-total">Total colaboradores</div>
        <div class="metric-value blue" id="metTotal">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Aguardando aprovação</div>
        <div class="metric-value amber" id="metPendente">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Aprovados</div>
        <div class="metric-value green" id="metAprovado">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Reprovados</div>
        <div class="metric-value purple" id="metReprovado">—</div>
      </div>
    </div>

    <!-- SWITCH COLABORADORES / CLIENTES -->
    <div class="secao-switch">
      <button class="secao-btn active" id="btnSecaoColab" onclick="trocarSecao('colaboradores')">
        🛡️ Colaboradores
      </button>
      <button class="secao-btn" id="btnSecaoClientes" onclick="trocarSecao('clientes')">
        👥 Clientes <span class="s-badge" id="badgeClientesPendentes" style="display:none">0</span>
      </button>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabsContainer">
      <button class="tab active" onclick="filtrar('pendente',this)">Pendentes <span class="tab-badge" id="badgePendente">0</span></button>
      <button class="tab" onclick="filtrar('aprovado',this)">Aprovados</button>
      <button class="tab" onclick="filtrar('reprovado',this)">Reprovados</button>
      <button class="tab" onclick="filtrar('todos',this)">Todos</button>
    </div>

    <!-- LISTA -->
    <div class="cards" id="listaCards">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://mbeseudygnbmicxyhhoh.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ncv2NBhaSFmnzkvKHpNu2w_3nZrwqGz';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let todosColabs   = [];
  let todosClientes = [];
  let filtroAtual   = 'pendente';
  let secaoAtual    = 'colaboradores';

  async function verificarSessao() {
    const { data: { session } } = await db.auth.getSession();
    if (session) mostrarPainel(session.user.email);
  }

  async function entrar() {
    const email = document.getElementById('emailInput').value.trim();
    const senha = document.getElementById('senhaInput').value;
    const btn   = document.getElementById('btnEntrar');
    const erro  = document.getElementById('loginError');

    if (!email || !senha) { erro.textContent='Preencha email e senha.'; erro.style.display='block'; return; }

    btn.disabled = true; btn.textContent = 'Entrando...'; erro.style.display = 'none';

    const { data, error } = await db.auth.signInWithPassword({ email, password: senha });
    if (error) {
      erro.textContent = 'Email ou senha incorretos.'; erro.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar no painel'; return;
    }
    mostrarPainel(data.user.email);
  }

  function mostrarPainel(email) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('navBar').style.display = 'flex';
    document.getElementById('mainPanel').style.display = 'block';
    const agora = new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    document.getElementById('navData').textContent = agora;
    carregarTudo();
  }

  async function sair() { await db.auth.signOut(); location.reload(); }

  async function carregarTudo() {
    await Promise.all([carregarColabs(), carregarClientes()]);
  }

  async function carregarColabs() {
    const { data, error } = await db.from('colaboradores').select('*').order('criado_em', { ascending: false });
    if (error) return;
    todosColabs = data || [];
    if (secaoAtual === 'colaboradores') { atualizarMetricas(); renderCards(filtroAtual); }
    atualizarBadges();
  }

  async function carregarClientes() {
    const { data, error } = await db.from('clientes').select('*').order('criado_em', { ascending: false });
    if (error) return;
    todosClientes = data || [];
    atualizarBadges();
    if (secaoAtual === 'clientes') { atualizarMetricasClientes(); renderClientes(filtroAtual); }
  }

  function atualizarBadges() {
    const cpend = todosClientes.filter(c => c.status === 'pendente').length;
    const badge = document.getElementById('badgeClientesPendentes');
    badge.textContent = cpend;
    badge.style.display = cpend > 0 ? 'inline-block' : 'none';

    const ppend = todosColabs.filter(c => c.status === 'pendente').length;
    document.getElementById('badgePendente').textContent = ppend;
    document.getElementById('badgePendente').style.display = ppend > 0 ? 'inline-block' : 'none';
  }

  function trocarSecao(secao) {
    secaoAtual = secao;
    filtroAtual = 'pendente';

    document.getElementById('btnSecaoColab').classList.toggle('active', secao === 'colaboradores');
    document.getElementById('btnSecaoClientes').classList.toggle('active', secao === 'clientes');

    // reset tabs
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab')[0].classList.add('active');

    if (secao === 'colaboradores') {
      document.getElementById('met-label-total').textContent = 'Total colaboradores';
      atualizarMetricas();
      renderCards('pendente');
    } else {
      document.getElementById('met-label-total').textContent = 'Total clientes';
      atualizarMetricasClientes();
      renderClientes('pendente');
    }
  }

  /* ── COLABORADORES ── */
  function atualizarMetricas() {
    document.getElementById('metTotal').textContent    = todosColabs.length;
    document.getElementById('metPendente').textContent = todosColabs.filter(c=>c.status==='pendente').length;
    document.getElementById('metAprovado').textContent = todosColabs.filter(c=>c.status==='aprovado').length;
    document.getElementById('metReprovado').textContent= todosColabs.filter(c=>c.status==='reprovado').length;
  }

  function filtrar(status, el) {
    filtroAtual = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    secaoAtual === 'colaboradores' ? renderCards(status) : renderClientes(status);
  }

  function renderCards(status) {
    const lista = status === 'todos' ? todosColabs : todosColabs.filter(c => c.status === status);
    const container = document.getElementById('listaCards');
    if (!lista.length) {
      const msgs = { pendente:'Nenhum cadastro pendente.', aprovado:'Nenhum colaborador aprovado.', reprovado:'Nenhum reprovado.', todos:'Nenhum colaborador.' };
      container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>${msgs[status]||''}</div>`; return;
    }
    container.innerHTML = lista.map(c => cardColabHTML(c)).join('');
  }

  function cardColabHTML(c) {
    const iniciais = c.nome ? c.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase() : '?';
    const foto = c.foto_url ? `<img src="${c.foto_url}" alt="${c.nome}">` : iniciais;
    const dataCad = new Date(c.criado_em).toLocaleDateString('pt-BR');
    const badgeClass = {pendente:'badge-pendente',aprovado:'badge-aprovado',reprovado:'badge-reprovado'}[c.status]||'';
    const badgeText  = {pendente:'Pendente',aprovado:'Aprovado',reprovado:'Reprovado'}[c.status]||c.status;
    const tel = c.whatsapp ? c.whatsapp.replace(/\D/g,'') : '';
    const acoes = c.status==='pendente' ? `
      <button class="btn-aprovar" onclick="mudarStatusColab('${c.id}','aprovado')">✓ Aprovar</button>
      <button class="btn-reprovar" onclick="mudarStatusColab('${c.id}','reprovado')">✗ Reprovar</button>
    ` : c.status==='aprovado' ? `
      ${tel?`<a class="btn-wpp" href="https://wa.me/55${tel}" target="_blank">WhatsApp</a>`:''}
      <button class="btn-reprovar" onclick="mudarStatusColab('${c.id}','reprovado')">Revogar</button>
    ` : `<button class="btn-aprovar" onclick="mudarStatusColab('${c.id}','aprovado')">Reativar</button>`;

    return `
      <div class="colab-card ${c.status}" id="card-${c.id}">
        <div class="avatar">${foto}</div>
        <div class="colab-info">
          <div class="colab-name">${c.nome||'—'}</div>
          <div class="colab-meta">
            <span>📱 ${c.whatsapp||'—'}</span><span>✉️ ${c.email||'—'}</span>
            <span>🪪 ${c.cpf||'—'}</span><span>💰 R$ ${c.valor_diaria||'—'}/diária</span>
            <span>📅 ${dataCad}</span>
            ${c.codigo_indicacao?`<span>🔗 ${c.codigo_indicacao}</span>`:''}
          </div>
          ${c.apresentacao?`<div class="colab-bio">${c.apresentacao}</div>`:''}
          <div class="colab-tags">
            ${c.nivel_servico?`<span class="ctag">${c.nivel_servico}</span>`:''}
            ${c.especialidade?`<span class="ctag">${c.especialidade}</span>`:''}
            ${c.regiao?`<span class="ctag">📍 ${c.regiao}</span>`:''}
            ${c.indicado_por?`<span class="ctag">Indicado: ${c.indicado_por}</span>`:''}
          </div>
        </div>
        <div class="colab-actions">
          <span class="status-badge ${badgeClass}">${badgeText}</span>
          ${acoes}
        </div>
      </div>`;
  }

  async function mudarStatusColab(id, novoStatus) {
    const { error } = await db.from('colaboradores').update({ status: novoStatus }).eq('id', id);
    if (error) { showToast('Erro ao atualizar.', 'error'); return; }
    const idx = todosColabs.findIndex(c => c.id === id);
    if (idx > -1) todosColabs[idx].status = novoStatus;
    atualizarMetricas(); renderCards(filtroAtual); atualizarBadges();
    showToast(novoStatus==='aprovado'?'✓ Colaborador aprovado!':'Cadastro reprovado.', novoStatus==='aprovado'?'success':'error');
  }

  /* ── CLIENTES ── */
  function atualizarMetricasClientes() {
    document.getElementById('metTotal').textContent    = todosClientes.length;
    document.getElementById('metPendente').textContent = todosClientes.filter(c=>c.status==='pendente').length;
    document.getElementById('metAprovado').textContent = todosClientes.filter(c=>c.status==='aprovado').length;
    document.getElementById('metReprovado').textContent= todosClientes.filter(c=>c.status==='reprovado').length;
  }

  function renderClientes(status) {
    const lista = status === 'todos' ? todosClientes : todosClientes.filter(c => c.status === status);
    const container = document.getElementById('listaCards');
    if (!lista.length) {
      const msgs = { pendente:'Nenhum cliente pendente.', aprovado:'Nenhum cliente aprovado.', reprovado:'Nenhum reprovado.', todos:'Nenhum cliente cadastrado.' };
      container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>${msgs[status]||''}</div>`; return;
    }
    container.innerHTML = lista.map(c => cardClienteHTML(c)).join('');
  }

  function cardClienteHTML(c) {
    const iniciais = c.nome ? c.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase() : '?';
    const dataCad  = new Date(c.criado_em).toLocaleDateString('pt-BR');
    const badgeClass = {pendente:'badge-pendente',aprovado:'badge-aprovado',reprovado:'badge-reprovado'}[c.status]||'';
    const badgeText  = {pendente:'Pendente',aprovado:'Aprovado',reprovado:'Reprovado'}[c.status]||c.status;
    const tel = c.telefone ? c.telefone.replace(/\D/g,'') : '';
    const vinculos = {sinagoga:'🕍 Sinagoga',clube:'🏠 Clube judaico',escola:'📚 Escola judaica',familiar:'👨‍👩‍👧 Familiar',empresarial:'💼 Empresarial',outro:'➕ Outro'};

    const acoes = c.status==='pendente' ? `
      <button class="btn-aprovar" onclick="mudarStatusCliente('${c.id}','aprovado')">✓ Aprovar</button>
      <button class="btn-reprovar" onclick="mudarStatusCliente('${c.id}','reprovado')">✗ Reprovar</button>
    ` : c.status==='aprovado' ? `
      ${tel?`<a class="btn-wpp" href="https://wa.me/55${tel}" target="_blank">WhatsApp</a>`:''}
      <button class="btn-reprovar" onclick="mudarStatusCliente('${c.id}','reprovado')">Revogar</button>
    ` : `<button class="btn-aprovar" onclick="mudarStatusCliente('${c.id}','aprovado')">Reativar</button>`;

    return `
      <div class="cliente-card ${c.status}" id="cli-${c.id}">
        <div class="cliente-avatar">${iniciais}</div>
        <div class="colab-info">
          <div class="colab-name">${c.nome||'—'}</div>
          <div class="colab-meta">
            <span>✉️ ${c.email||'—'}</span>
            <span>🪪 ${c.cpf||'—'}</span>
            ${c.telefone?`<span>📱 ${c.telefone}</span>`:''}
            <span>📅 ${dataCad}</span>
          </div>
          <div class="colab-tags" style="margin-top:6px">
            <span class="vinculo-tag">${vinculos[c.vinculo]||c.vinculo||'—'}</span>
            ${c.instituicao?`<span class="ctag">🏛️ ${c.instituicao}</span>`:''}
          </div>
          <div class="contato-pref">Prefere receber por: <strong style="color:rgba(255,255,255,0.6)">${c.contato_preferido==='whatsapp'?'💬 WhatsApp':'✉️ Email'}</strong></div>
        </div>
        <div class="colab-actions">
          <span class="status-badge ${badgeClass}">${badgeText}</span>
          ${acoes}
        </div>
      </div>`;
  }

  async function mudarStatusCliente(id, novoStatus) {
    const { error } = await db.from('clientes').update({ status: novoStatus }).eq('id', id);
    if (error) { showToast('Erro ao atualizar.', 'error'); return; }
    const idx = todosClientes.findIndex(c => c.id === id);
    if (idx > -1) todosClientes[idx].status = novoStatus;
    atualizarMetricasClientes(); renderClientes(filtroAtual); atualizarBadges();
    showToast(novoStatus==='aprovado'?'✓ Cliente aprovado!':'Cliente reprovado.', novoStatus==='aprovado'?'success':'error');
  }

  function showToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${tipo}`; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  verificarSessao();
</script>
</body>
</html>
